# Hand-curated (question, sql, notes) examples — the few-shot library.
#
# The indexer embeds the `question` field only — that's what we want
# the user's question to match against. The full payload (sql + notes)
# is what gets surfaced to the SQL generator at retrieval time.
#
# Add `alias_questions:` to broaden the match radius for canonical
# queries that have multiple natural phrasings.
#
# Pick examples that demonstrate non-obvious join paths, time-window
# patterns, dataset quirks (the SA/NZ store path), and conventions
# the model would otherwise have to guess.

- id: top_films_by_rentals_2022
  question: "Top 10 films by rental count in 2022"
  alias_questions:
    - "Most-rented films of 2022"
    - "Most popular movies last year"
    - "Films with the most rentals"
    - "Best-performing films by rental volume"
  sql: |
    SELECT f.title, COUNT(*) AS rental_count
    FROM film f
    JOIN inventory i ON i.film_id = f.film_id
    JOIN rental r ON r.inventory_id = i.inventory_id
    WHERE EXTRACT(YEAR FROM r.rental_date) = 2022
    GROUP BY f.title
    ORDER BY rental_count DESC
    LIMIT 10
  notes: |
    Canonical film→rental join goes through `inventory` (no direct FK).
    Filter on rental_date, not return_date — return_date is nullable
    for outstanding rentals.

- id: monthly_revenue_2022
  question: "Monthly revenue across 2022"
  alias_questions:
    - "Revenue by month in 2022"
    - "Monthly sales trend"
    - "How did sales grow over the year"
  sql: |
    SELECT date_trunc('month', payment_date) AS month,
           SUM(amount) AS revenue
    FROM payment
    GROUP BY month
    ORDER BY month
  notes: |
    Use date_trunc('month', ...) — keeps the column as a real timestamp
    so the chart layer can format axis labels properly. Avoid TO_CHAR
    for the GROUP BY key (returns text, breaks ordering).
    Payment dates span Jan-Jul 2022 only.

- id: revenue_by_store_country
  question: "Revenue by store country"
  alias_questions:
    - "Sales per country"
    - "Which countries do we make the most money in"
    - "Revenue split by store location"
  sql: |
    SELECT co.country, SUM(p.amount) AS revenue
    FROM payment p
    JOIN rental r ON r.rental_id = p.rental_id
    JOIN inventory i ON i.inventory_id = r.inventory_id
    JOIN store s ON s.store_id = i.store_id
    JOIN address a ON a.address_id = s.address_id
    JOIN city ci ON ci.city_id = a.city_id
    JOIN country co ON co.country_id = ci.country_id
    GROUP BY co.country
    ORDER BY revenue DESC
  notes: |
    THE canonical store-country path: payment → rental → inventory →
    store → address → city → country. Returns exactly 2 rows: South
    Africa and New Zealand. The 500-store catalog is metadata only;
    only stores 1 and 2 have rental activity. Do NOT use
    payment.staff_id → staff.store_id (different stores, same money,
    misleading attribution).

- id: top_customers_by_spend
  question: "Top 10 customers by total spend"
  alias_questions:
    - "Highest-spending customers"
    - "Best customers"
    - "Most valuable customers"
  sql: |
    SELECT c.customer_id, c.first_name, c.last_name,
           SUM(p.amount) AS total_spent,
           COUNT(p.payment_id) AS payment_count
    FROM customer c
    JOIN payment p ON p.customer_id = c.customer_id
    GROUP BY c.customer_id, c.first_name, c.last_name
    ORDER BY total_spent DESC
    LIMIT 10
  notes: |
    Customer-level aggregation. Don't aggregate over rentals — payment
    is the source of truth for revenue per customer.

- id: rentals_per_category_2022
  question: "Rentals per film category in 2022"
  alias_questions:
    - "Most popular genres"
    - "Category breakdown of rentals"
    - "Which film genres are most rented"
  sql: |
    SELECT cat.name AS category, COUNT(*) AS rental_count
    FROM rental r
    JOIN inventory i ON i.inventory_id = r.inventory_id
    JOIN film_category fc ON fc.film_id = i.film_id
    JOIN category cat ON cat.category_id = fc.category_id
    WHERE EXTRACT(YEAR FROM r.rental_date) = 2022
    GROUP BY cat.name
    ORDER BY rental_count DESC
  notes: |
    Many-to-many path: rental → inventory → film_category → category.
    In this dataset every film has exactly one category, so JOIN doesn't
    inflate rental counts.

- id: outstanding_rentals_today
  question: "Films currently rented out and not yet returned"
  alias_questions:
    - "Open rentals"
    - "Outstanding rentals"
    - "Films still checked out"
    - "Unreturned rentals"
  sql: |
    SELECT f.title, c.first_name, c.last_name, r.rental_date
    FROM rental r
    JOIN inventory i ON i.inventory_id = r.inventory_id
    JOIN film f ON f.film_id = i.film_id
    JOIN customer c ON c.customer_id = r.customer_id
    WHERE r.return_date IS NULL
    ORDER BY r.rental_date DESC
  notes: |
    `return_date IS NULL` is the only criterion — an "outstanding"
    rental is one that hasn't been returned yet, regardless of how
    long ago it was rented.

- id: revenue_by_customer_country
  question: "Revenue by the country where customers live"
  alias_questions:
    - "Customer-country revenue"
    - "Revenue per customer country"
    - "Sales split by where customers are"
  sql: |
    SELECT co.country, SUM(p.amount) AS revenue
    FROM payment p
    JOIN customer c ON c.customer_id = p.customer_id
    JOIN address a ON a.address_id = c.address_id
    JOIN city ci ON ci.city_id = a.city_id
    JOIN country co ON co.country_id = ci.country_id
    GROUP BY co.country
    ORDER BY revenue DESC
  notes: |
    DIFFERENT path from store-country revenue. This one goes through
    customer.address. Pagila customers ARE distributed across many
    countries (unlike stores), so this returns ~100 rows.
    Use this when the question is about CUSTOMER geography ("where
    our customers are"), not store geography.
